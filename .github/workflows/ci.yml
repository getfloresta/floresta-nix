name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nix-sanity-check:
    name: Nix Sanity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: floresta-flake
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ github.event_name == 'pull_request' }}

      - name: Nix flake check
        run: nix flake check -L

      - name: Verify consumer integration
        run: nix flake check ./examples -L --no-build

  service-tests:
    name: Service Module Tests
    needs: nix-sanity-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: floresta-flake
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ github.event_name == 'pull_request' }}

      - name: Run eval tests
        run: nix build -L .#checks.x86_64-linux.service-eval-test

      - name: Run VM integration test
        run: nix build -L .#checks.x86_64-linux.service-vm-test

  build:
    name: ${{ matrix.package }} (${{ matrix.system }})
    needs: nix-sanity-check
    strategy:
      fail-fast: false
      matrix:
        package: [florestad, floresta-cli, libfloresta, default]
        system: [x86_64-linux, x86_64-darwin, aarch64-linux, aarch64-darwin]
        exclude:
          - system: aarch64-linux
            package: libfloresta
          - system: aarch64-linux
            package: default
          - system: aarch64-darwin
            package: libfloresta
          - system: aarch64-darwin
            package: default
    runs-on: >-
      ${{
        contains(matrix.system, 'darwin') && 'macos-14' ||
        matrix.system == 'aarch64-linux' && 'ubuntu-24.04-arm' ||
        'ubuntu-latest'
      }}
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: floresta-flake
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ github.event_name == 'pull_request' }}

      - name: Build ${{ matrix.package }}
        run: nix build -L .#${{ matrix.package }}

  release:
    name: Release prebuilt libs
    if: startsWith(github.ref, 'refs/tags/')
    needs: nix-sanity-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: floresta-flake
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build prebuilt bundle
        run: nix build -L .#android-prebuilt

      - name: Package per-target archives
        run: |
          REV=$(cat result/REV)
          mkdir -p release
          for target in aarch64 armv7 x86_64; do
            tar -C result/$target -cf - libbitcoinkernel.a | zstd -19 -o release/libbitcoinkernel-${target}-${REV}.tar.zst
          done
          cd release && sha256sum *.tar.zst | sort -k2 > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
