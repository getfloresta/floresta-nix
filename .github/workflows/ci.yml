name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  nix-sanity-check:
    name: Nix Sanity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: floresta-flake
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ github.event_name == 'pull_request' }}

      - name: Nix flake check
        run: nix flake check -L

      - name: Verify consumer integration
        run: nix flake check ./examples -L --no-build

  service-tests:
    name: Service Module Tests
    needs: nix-sanity-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: floresta-flake
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ github.event_name == 'pull_request' }}

      - name: Run eval tests
        run: nix build -L .#checks.x86_64-linux.service-eval-test

      - name: Run VM integration test
        run: nix build -L .#checks.x86_64-linux.service-vm-test

  build:
    name: ${{ matrix.package }} (${{ matrix.system }})
    needs: nix-sanity-check
    strategy:
      fail-fast: false
      matrix:
        package: [florestad, floresta-cli, libfloresta, default]
        system: [x86_64-linux, x86_64-darwin, aarch64-linux, aarch64-darwin]
        exclude:
          - system: aarch64-linux
            package: libfloresta
          - system: aarch64-linux
            package: default
          - system: aarch64-darwin
            package: libfloresta
          - system: aarch64-darwin
            package: default
    runs-on: >-
      ${{
        contains(matrix.system, 'darwin') && 'macos-14' ||
        matrix.system == 'aarch64-linux' && 'ubuntu-24.04-arm' ||
        'ubuntu-latest'
      }}
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: floresta-flake
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ github.event_name == 'pull_request' }}

      - name: Build ${{ matrix.package }}
        run: nix build -L .#${{ matrix.package }}
