version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "weekly"
    # floresta-master is tracked separately by the update-master workflow
    # for more frequent syncing.
    ignore:
      - dependency-name: "floresta-master"
